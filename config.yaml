telegram:
  api_id: ${TG_API_ID}
  api_hash: ${TG_API_HASH}

web:
  host: "0.0.0.0"
  port: 8080
  password: ${WEB_PASS}

scheduler:
  collect_interval_minutes: 30
  delay_between_channels_sec: 2
  delay_between_requests_sec: 1
  collection_stream_timeout_sec: 120
  snapshot_publish_timeout_sec: 30
  # Timeout for the background filter-analyze task; 0 disables (#793)
  filter_analyze_timeout_sec: 600
  max_flood_wait_sec: 300
  collection_worker_count: 0
  stats_all_max_channels_per_run: 30
  stats_all_cooldown_sec: 10
  stats_all_worker_count: 3

notifications:
  admin_chat_id: null

database:
  path: "data/tg_search.db"

llm:
  enabled: false
  provider: "openai"
  model: "gpt-4o-mini"
  api_key: ${LLM_API_KEY}

agent:
  model: ${AGENT_MODEL}
  fallback_model: ${AGENT_FALLBACK_MODEL}
  fallback_api_key: ${AGENT_FALLBACK_API_KEY}

security:
  session_encryption_key: ${SESSION_ENCRYPTION_KEY}
