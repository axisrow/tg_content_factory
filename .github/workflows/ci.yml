name: CI

on:
  push:
    branches:
      - main
      - fix/**
      - codex/**
  pull_request:

jobs:
  check-branch-name:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Reject branch names with "+"
        if: contains(github.head_ref, '+')
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⛔ Символ `+` недопустим в названии ветки (`' + context.payload.pull_request.head.ref + '`). Переименуйте ветку без `+` (используйте `-` или `.`).'
            });
            core.setFailed('Branch name contains "+", which is not allowed.');

  # Static gates run as their own job so they fail fast and in parallel with the
  # long test job instead of serializing ~20s in front of pytest (#944).
  static-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests conftest.py

      - name: Import architecture contracts
        run: lint-imports --config .importlinter

      # Blocking cyclomatic-complexity gate (#923). After #922/#923 reduced the
      # last rank-F functions, main is at F:0 — this keeps it there: any function
      # that grows back to radon rank F (CC ≥ 41) reds CI. radon/vulture ship in
      # the [dev] extra so `pip install -e ".[dev]"` above already provides them.
      - name: Cyclomatic-complexity gate (no rank-F functions)
        run: python scripts/code_health.py --fail-on F

      # Non-blocking duplication guard (#807 dedup round 2). Current level is
      # ~0.6%; threshold 1% leaves headroom while surfacing regressions. Kept
      # advisory (continue-on-error) so it never reds CI on its own. jscpd is
      # version-pinned so CI never executes an unvetted future npm release
      # (review #918: @claude/@codex supply-chain note).
      - name: Code duplication guard (advisory)
        continue-on-error: true
        run: npx -y jscpd@5.0.10 --min-tokens 70 --format python --threshold 1 src

      - name: Enforce pytest warnings as errors
        run: |
          python - <<'PY'
          import sys
          import tomllib

          with open("pyproject.toml", "rb") as f:
              config = tomllib.load(f)

          actual = config["tool"]["pytest"]["ini_options"].get("filterwarnings")
          expected = ["error"]
          if actual != expected:
              print(f"Expected tool.pytest.ini_options.filterwarnings = {expected!r}, got {actual!r}")
              sys.exit(1)
          PY

      # Fast offline preflight moved here (#944 phase 2) so it runs once as a
      # cheap fail-fast alongside the static gates, instead of once per test
      # shard. ~sub-second tests; the time is whole-tree collection overhead.
      # Live smoke (real_provider_smoke / codex_*) stays opt-in and is skipped.
      - name: Pytest (smoke preflight)
        run: pytest tests -q -m smoke

  lint-and-test:
    runs-on: ubuntu-latest

    # Shard the parallel-safe suite across N runners (pytest-split); each shard
    # still fans out over all runner cores via `-n auto` (#944 phase 2). Wall-clock
    # of the heavy phase drops ~linearly with the shard count.
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # One shard of the parallel-safe suite. conftest uses every runner core on
      # CI, so each shard also fans out via `-n auto`. --splits/--group (pytest-split)
      # partition the tests; without a durations file the split is by count, which
      # is balanced enough now that the 37s collection-invariants test is fixed.
      - name: Pytest (parallel-safe, shard ${{ matrix.shard }}/3)
        run: pytest tests -q -m "not aiosqlite_serial" -n auto --splits 3 --group ${{ matrix.shard }} --durations=25

  # The aiosqlite-serial suite (~40 tests) must run without xdist. It lives in its
  # own job so it runs in parallel with the shards instead of weighing down one of
  # them (#944 phase 2).
  serial-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Pytest (aiosqlite serial)
        run: pytest tests -q -m aiosqlite_serial
