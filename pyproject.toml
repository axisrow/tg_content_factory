[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tg-user-search"
version = "0.1.11"
description = "Telegram Post Search & Monitoring"
requires-python = ">=3.11"
dependencies = [
    "telethon==1.42.0",
    "telethon-cli==0.1.1",
    "fastapi==0.128.0",
    "uvicorn[standard]==0.40.0",
    "jinja2==3.1.6",
    "aiosqlite==0.22.1",
    "apscheduler==3.11.2",
    "pydantic==2.12.5",
    "pydantic-settings==2.12.0",
    "pyyaml==6.0.3",
    "python-dotenv==1.2.1",
    "python-multipart==0.0.22",
    "cryptography==46.0.5",
    "openpyxl>=3.1.0",
    "aiohttp>=3.9.0",
    "claude-agent-sdk",
    "deepagents==0.3.6",
]

[project.optional-dependencies]
dev = [
    "pytest==9.0.2",
    "pytest-asyncio==1.3.0",
    "pytest-timeout==2.4.0",
    "pytest-xdist==3.8.0",
    "httpx==0.28.1",
    "ruff==0.14.13",
]

[tool.ruff]
target-version = "py311"
line-length = 100
include = ["*.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
timeout = 30
addopts = "--dist=loadgroup"
markers = [
    "native_backend_allowed: test intentionally exercises explicit native Telethon allowlist flows",
    "real_tg_safe: opt-in real Telegram API test limited to read-only sandbox scenarios",
    "real_tg_manual: opt-in real Telegram API test for sandbox-only manual scenarios",
    "real_tg_never: test must never request a real Telegram client fixture",
    "telegram_unit: pure unit test that does not verify backend transport wiring",
    "real_materializer: test uses real SessionMaterializer instead of the fake stub",
    "aiosqlite_serial: test must run without xdist parallelism because it exercises aiosqlite-backed database paths",
]
