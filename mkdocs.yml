site_name: TG Agent
site_description: Telegram Post Search, Monitoring & Content Automation
site_url: https://axisrow.github.io/tg_content_factory/
repo_url: https://github.com/axisrow/tg_content_factory
repo_name: axisrow/tg_content_factory

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  # Авто-генерация API-страниц из Python docstring для не-FastAPI поверхностей
  # (сервисы, agent-tools, CLI-internals) — закрывает дыру parity-матрицы #1048.
  # show_if_no_docstring=true: рендерим символы и без docstring, чтобы сборка не
  # падала на ещё недокументированных модулях (поднятие покрытия — отдельно, #1072).
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: false
            show_if_no_docstring: true
            show_root_heading: true
            show_root_full_path: true
            members_order: source
            separate_signature: true
            merge_init_into_class: true
            show_submodules: false

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Configuration: getting-started/configuration.md
    - Quick Start: getting-started/quickstart.md
  - Features:
    - Overview: features/overview.md
    - Channel Management: features/channels.md
    - Message Collection: features/collection.md
    - Search: features/search.md
    - Content Pipelines: features/pipelines.md
    - Photo Loader: features/photo-loader.md
    - Agent System: features/agent.md
    - Scheduler: features/scheduler.md
    - Notifications: features/notifications.md
    - Filters: features/filters.md
    - Analytics: features/analytics.md
    - Dialogs: features/dialogs.md
  - Reference:
    - CLI Reference: reference/cli.md
    - Web API Reference: reference/web-api.md
    - CLI / Web Parity: reference/parity.md
    - Agent Tools: reference/agent-tools.md
    - RSS / Atom Feeds: reference/rss-feeds.md
    - Doc-coverage: reference/doc-coverage.md
  - API Reference:
    - Overview: reference/api/index.md
    - Services: reference/api/services.md
    - Agent Tools: reference/api/agent-tools-api.md
    - CLI Internals: reference/api/cli-internals.md
  - Operators:
    - SSO Session Transfer: operators/sso-session-transfer.md
    - Scheduler: operators/scheduler.md
  - Architecture: architecture.md
  - Service Map: feature-map.md
  - Parity Matrix: parity-matrix.md
