{% extends "base.html" %}
{% block title %}Дебаг — TG Agent{% endblock %}
{% block content %}
<h1>Консоль сервера</h1>
<p><small class="text-muted">Последние 500 записей. Обновляется каждые 3 секунды.</small></p>
<div class="table-responsive">
  <table class="table table-sm table-striped">
    <thead>
      <tr><th>Время</th><th>Уровень</th><th>Логгер</th><th>Сообщение</th></tr>
    </thead>
    <tbody hx-get="/debug/logs" hx-trigger="every 3s" hx-swap="innerHTML">
      {% include "_debug_logs.html" %}
    </tbody>
  </table>
</div>
{% endblock %}
